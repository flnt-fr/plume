<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Plume</title>
  <!-- Rounded square background (remove if using as inline icon) -->
  <rect width="32" height="32" rx="6" fill="#1C1B1A"/>
  <!-- Feather glyph centered at (16, 16) -->
  <g transform="translate(16, 17)">
    <!-- Subtle fill -->
    <path d="M 0,-13 Q 7,-7 4,3 L 0,8 L -4,3 Q -7,-7 0,-13 Z" fill="#24837B" opacity="0.15"/>
    <!-- Right edge -->
    <path d="M 0,-13 Q 7,-7 4,3 L 0,8" fill="none" stroke="#24837B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left edge -->
    <path d="M 0,-13 Q -7,-7 -4,3 L 0,8" fill="none" stroke="#24837B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Quill -->
    <line x1="0" y1="-13" x2="0" y2="11" stroke="#24837B" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Barbs right -->
    <line x1="1" y1="-6" x2="5" y2="-7" stroke="#24837B" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
    <line x1="1" y1="0" x2="4" y2="-1" stroke="#24837B" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
    <!-- Barbs left -->
    <line x1="-1" y1="-6" x2="-5" y2="-7" stroke="#24837B" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
    <line x1="-1" y1="0" x2="-4" y2="-1" stroke="#24837B" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  </g>
</svg>
